<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deploy Station</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #0088ff;
    --warn: #ff4466;
    --text: #c8c8d8;
    --text-dim: #55556a;
    --text-bright: #eeeef8;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(10px);
  }

  .logo {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-weight: 700;
    color: #000;
    font-size: 14px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-bright);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  header p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .status-bar {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    padding: 32px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  /* Project selector */
  .project-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .project-row label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    outline: none;
    cursor: pointer;
  }

  select:focus { border-color: rgba(0,255,136,0.4); }

  .git-badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(0,255,136,0.12);
    color: var(--accent);
  }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent2);
    background: rgba(0,136,255,0.04);
  }

  .drop-zone.has-file {
    border-color: var(--accent);
    border-style: solid;
    background: rgba(0,255,136,0.03);
    padding: 24px 20px;
  }

  .drop-zone .icon {
    font-size: 32px;
    margin-bottom: 12px;
  }

  .drop-zone .hint {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }

  .drop-zone .filename {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .drop-zone .filesize {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .drop-zone input[type="file"] { display: none; }

  /* Preview */
  .preview {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: none;
  }

  .preview.visible { display: block; }

  .preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .preview-header span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .file-list {
    padding: 12px 14px;
    max-height: 250px;
    overflow-y: auto;
  }

  .file-list .file-entry {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    padding: 4px 0;
    border-bottom: 1px solid rgba(30,30,46,0.5);
  }

  .file-list .file-entry:last-child { border-bottom: none; }

  .file-list .file-path { color: var(--accent); }
  .file-list .file-size { color: var(--text-dim); margin-left: 12px; }

  /* Deploy button */
  .btn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
    width: 100%;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover {
    background: #00ffaa;
    box-shadow: 0 0 20px rgba(0,255,136,0.3);
  }

  .btn-primary:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* Result */
  .result {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: none;
  }

  .result.visible { display: block; }

  .result.success { border-color: rgba(0,255,136,0.3); }
  .result.error { border-color: rgba(255,68,102,0.3); }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }

  .result-header .status-icon { font-size: 16px; }

  .result-header .status-text {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
  }

  .result.success .status-text { color: var(--accent); }
  .result.error .status-text { color: var(--warn); }

  .result-body {
    padding: 14px;
  }

  .result-body pre {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
  }

  .result-files {
    padding: 0 14px 14px;
  }

  .result-files .file-entry {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    padding: 3px 0;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    padding: 12px 20px;
    border-radius: 8px;
    z-index: 100;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    box-shadow: 0 0 30px rgba(0,255,136,0.15);
  }

  #toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #000;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    background: rgba(0,255,136,0.15);
    color: var(--accent);
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    margin-left: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">DS</div>
  <div>
    <h1>Deploy Station</h1>
    <p>zip upload &rarr; project deploy</p>
  </div>
  <div class="status-bar">
    <div class="status-dot"></div>
    <span>ready</span>
  </div>
</header>

<main>

  <!-- Step 1: Select project -->
  <div>
    <div class="section-label">1 &mdash; Project</div>
    <div class="project-row">
      <label>DEPLOY NAAR /</label>
      <select id="project-select">
        <option value="">laden...</option>
      </select>
    </div>
  </div>

  <!-- Step 2: Upload zip -->
  <div>
    <div class="section-label">2 &mdash; Zip uploaden</div>
    <div class="drop-zone" id="drop-zone">
      <div class="icon">&#128230;</div>
      <div class="hint">Sleep een .zip hierheen of klik om te kiezen</div>
      <input type="file" id="file-input" accept=".zip">
    </div>
  </div>

  <!-- Preview -->
  <div class="preview" id="preview">
    <div class="preview-header">
      <span>Bestanden in zip <span class="badge" id="preview-count">0</span></span>
    </div>
    <div class="file-list" id="file-list"></div>
  </div>

  <!-- Step 3: Deploy -->
  <button class="btn btn-primary" id="deploy-btn" disabled onclick="deploy()">
    &#x2191; Deploy naar project
  </button>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-header">
      <span class="status-icon" id="result-icon"></span>
      <span class="status-text" id="result-text"></span>
    </div>
    <div class="result-files" id="result-files"></div>
    <div class="result-body">
      <pre id="result-git"></pre>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
let selectedFile = null;

// --- Load projects ---
async function loadProjects() {
  try {
    const res = await fetch('/api/projects');
    const data = await res.json();
    const sel = document.getElementById('project-select');
    sel.innerHTML = '<option value="">kies project...</option>';
    data.projects.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name + (p.git ? ' (git)' : '');
      sel.appendChild(opt);
    });
  } catch (e) {
    toast('Kan projecten niet laden');
  }
}

// --- Drop zone ---
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.zip')) {
    handleFile(file);
  } else {
    toast('Alleen .zip bestanden');
  }
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  selectedFile = file;
  const size = file.size < 1024 ? file.size + ' B'
    : file.size < 1048576 ? (file.size / 1024).toFixed(1) + ' KB'
    : (file.size / 1048576).toFixed(1) + ' MB';

  dropZone.classList.add('has-file');
  dropZone.innerHTML = `
    <div class="filename">${esc(file.name)}</div>
    <div class="filesize">${size}</div>
    <input type="file" id="file-input" accept=".zip" style="display:none">
  `;

  // Re-bind file input
  const newInput = dropZone.querySelector('input');
  newInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });
  dropZone.addEventListener('click', () => newInput.click());

  previewZip(file);
  updateDeployBtn();

  // Hide previous result
  document.getElementById('result').classList.remove('visible', 'success', 'error');
}

async function previewZip(file) {
  const preview = document.getElementById('preview');
  const fileList = document.getElementById('file-list');
  const countBadge = document.getElementById('preview-count');

  // Read zip with JSZip-free approach: just list from server or read locally
  // We'll read the zip client-side using the FileReader + basic zip parsing
  // Actually, let's just show the filename for now and let the server handle extraction
  // For a proper preview we need JSZip — let's add it back just for preview
  fileList.innerHTML = '<div class="file-entry" style="color:var(--text-dim)">Preview laden...</div>';
  preview.classList.add('visible');

  try {
    // Dynamically load JSZip for client-side preview only
    if (typeof JSZip === 'undefined') {
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
    }
    const arrayBuf = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(arrayBuf);
    const entries = [];
    zip.forEach((path, entry) => {
      if (!entry.dir) {
        entries.push({ path, size: entry._data ? entry._data.uncompressedSize : 0 });
      }
    });

    countBadge.textContent = entries.length;
    fileList.innerHTML = entries.map(e => {
      const size = e.size < 1024 ? e.size + ' B'
        : e.size < 1048576 ? (e.size / 1024).toFixed(1) + ' KB'
        : (e.size / 1048576).toFixed(1) + ' MB';
      return `<div class="file-entry"><span class="file-path">${esc(e.path)}</span><span class="file-size">${size}</span></div>`;
    }).join('');
  } catch (e) {
    fileList.innerHTML = '<div class="file-entry" style="color:var(--warn)">Kan zip niet lezen</div>';
    countBadge.textContent = '?';
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// --- Deploy ---
function updateDeployBtn() {
  const project = document.getElementById('project-select').value;
  document.getElementById('deploy-btn').disabled = !selectedFile || !project;
}

document.getElementById('project-select').addEventListener('change', updateDeployBtn);

async function deploy() {
  const project = document.getElementById('project-select').value;
  if (!selectedFile || !project) return;

  const btn = document.getElementById('deploy-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>deploying...';

  const form = new FormData();
  form.append('project', project);
  form.append('file', selectedFile);

  try {
    const res = await fetch('/api/deploy', { method: 'POST', body: form });
    const data = await res.json();

    const result = document.getElementById('result');
    const icon = document.getElementById('result-icon');
    const text = document.getElementById('result-text');
    const files = document.getElementById('result-files');
    const git = document.getElementById('result-git');

    if (data.ok) {
      result.className = 'result visible success';
      icon.textContent = '\u2713';
      text.textContent = `${data.count} bestanden deployed naar ${data.project}`;
      files.innerHTML = data.files.map(f =>
        `<div class="file-entry">${esc(f)}</div>`
      ).join('');
      git.textContent = data.git ? data.git_output || '(geen git output)' : '(geen git repo)';
      toast('Deploy geslaagd');
    } else {
      result.className = 'result visible error';
      icon.textContent = '\u2717';
      text.textContent = data.error || 'Deploy mislukt';
      files.innerHTML = '';
      git.textContent = '';
      toast('Deploy mislukt');
    }
  } catch (e) {
    const result = document.getElementById('result');
    result.className = 'result visible error';
    document.getElementById('result-icon').textContent = '\u2717';
    document.getElementById('result-text').textContent = 'Verbinding mislukt';
    document.getElementById('result-files').innerHTML = '';
    document.getElementById('result-git').textContent = e.message;
    toast('Server niet bereikbaar');
  }

  btn.disabled = false;
  btn.innerHTML = '&#x2191; Deploy naar project';
  updateDeployBtn();
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
loadProjects();
</script>
</body>
</html>
